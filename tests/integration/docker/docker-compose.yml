services:
  platform-auth:
    image: ghcr.io/neuro-inc/platformauthapi:latest
    container_name: platform-storage-platform-auth
    environment:
      - NP_AUTH_API_PORT=8080
      - NP_JWT_SECRET=secret
    ports:
      - 8080

  moto:
    image: motoserver/moto:4.2.12
    container_name: platform-storage-moto
    command:
      - -p
      - "5000"
    ports:
      - 5000

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    container_name: platform-storage-seaweedfs-s3
    command: [
      "/bin/sh",
      "-c",
      "weed server -s3 -s3.port=9000 -dir=/data -ip=0.0.0.0 -s3.allow_empty_buckets -s3.skip_auth"
    ]
    ports:
      - "9000:9000"
      - "8333:8333"
    environment:
      - WEED_S3_ADMIN_ACCESS_KEY=admin
      - WEED_S3_ADMIN_SECRET_KEY=devsecret
    volumes:
      - seaweedfs_data:/data

volumes:
  seaweedfs_data:
